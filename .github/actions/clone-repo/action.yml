name: "Clone Repo"
description: "Clone this repository"
inputs:
  repo_name:
    description: "Repository name"
    required: true
  template_branch:
    description: "Template branch to persist in the new repository"
    required: true
  github_token:
    description: "GitHub token for authentication"
    required: true
  tf_org_token:
    description: "Terraform Org API token"
    required: true
  tf_project_id:
    description: "Terraform Cloud Project ID"
    required: true
  tf_org_name:
    description: "Terraform Cloud Organization Name"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install action tools
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        mise trust -q
        mise install
    - name: Validate Inputs
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CLONE_REPO_NAME: ${{ inputs.repo_name }}
        SOURCE_REPO_NAME: ${{ github.event.repository.name }}
        TF_ORG_NAME: ${{ inputs.tf_org_name }}
      run: mise run ./validate-inputs.sh
    - name: Bootstrap TF Workspace
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CLONE_REPO_NAME: ${{ inputs.repo_name }}
        TF_ORG_TOKEN: ${{ inputs.tf_org_token }}
        TF_PROJECT_ID: ${{ inputs.tf_project_id }}
        TF_ORG_NAME: ${{ inputs.tf_org_name }}
      run: mise run ./bootstrap-terraform.sh
    - name: Bootstrap Branch
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CLONE_REPO_NAME: ${{ inputs.repo_name }}
        SOURCE_REPO_NAME: ${{ github.event.repository.name }}
        GH_TOKEN: ${{ inputs.github_token }}
        WORKSPACE_DIR: ${{ github.workspace }}
      run: mise run ./bootstrap-branch.sh
    - name: Hydrate Template
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CLONE_REPO_NAME: ${{ inputs.repo_name }}
        SOURCE_REPO_NAME: ${{ github.event.repository.name }}
        WORKSPACE_DIR: ${{ github.workspace }}
      run: mise run ./hydrate.sh
    - name: Publish Repository
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CLONE_REPO_NAME: ${{ inputs.repo_name }}
        SOURCE_REPO_NAME: ${{ github.event.repository.name }}
        TEMPLATE_BRANCH: ${{ inputs.template_branch }}
        GH_TOKEN: ${{ inputs.github_token }}
        WORKSPACE_DIR: ${{ github.workspace }}
      run: mise run ./publish.sh
