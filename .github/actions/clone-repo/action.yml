name: "Install Clone Repo CLI"
description: "Installs the Clone Repo CLI"
runs:
  using: "composite"
  steps:
    - name: Install Package
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm i -g
        clone_tools="$RUNNER_TEMP/clone-tools"
        mkdir -p "$clone_tools"
        mise install --shared "$clone_tools"
        echo "$clone_tools" >> "$GITHUB_PATH"
