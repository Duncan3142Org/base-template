name: "Release NPM Package"
description: "Runs Semantic Release to publish a new npm package version"
inputs:
  assets:
    description: "JSON array of files to commit after release"
    required: false
    default: '["CHANGELOG.md", "package.json", "package-lock.json"]'
  major-branch:
    description: "Update major version branch (e.g., v/1)"
    required: false
    default: "false"
  minor-branch:
    description: "Update minor version branch (e.g., v/1.2)"
    required: false
    default: "false"
  branch-prefix:
    description: "Branch path prefix for major/minor branches"
    required: false
    default: "v"
  github-pkg-token:
    description: "Token for publishing to GitHub Packages"
    required: true
  github-token:
    description: "Token for GitHub API operations (contents, issues, PRs)"
    required: true
  git-author-name:
    description: "Git author name for release commits"
    required: true
  git-author-email:
    description: "Git author email for release commits"
    required: true
  git-committer-name:
    description: "Git committer name for release commits"
    required: true
  git-committer-email:
    description: "Git committer email for release commits"
    required: true
runs:
  using: "composite"
  steps:
    - name: Install Dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev

    - name: Extract Package Metadata
      shell: bash
      run: |
        PKG_NAME=$(jq -r '.name | split("/") | last' ./package.json)
        echo "PKG_NAME=$PKG_NAME" >> $GITHUB_ENV

    - name: Run Semantic Release
      shell: bash
      env:
        GITHUB_PKG_TOKEN: ${{ inputs.github-pkg-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GIT_AUTHOR_NAME: ${{ inputs.git-author-name }}
        GIT_AUTHOR_EMAIL: ${{ inputs.git-author-email }}
        GIT_COMMITTER_NAME: ${{ inputs.git-committer-name }}
        GIT_COMMITTER_EMAIL: ${{ inputs.git-committer-email }}
        RELEASE_PLUGIN_DIR: ${{ github.action_path }}
        RELEASE_ASSETS: ${{ inputs.assets }}
        RELEASE_MAJOR_BRANCH: ${{ inputs.major-branch }}
        RELEASE_MINOR_BRANCH: ${{ inputs.minor-branch }}
        RELEASE_BRANCH_PREFIX: ${{ inputs.branch-prefix }}
      run: |
        '${{ github.action_path }}/node_modules/.bin/semantic-release' --extends '${{ github.action_path }}/release.config.js'
