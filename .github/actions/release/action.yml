name: "Release NPM Package"
description: "Runs Semantic Release to publish a new npm package version"
inputs:
  assets:
    description: "JSON array of files to commit after release"
    required: false
    default: '["CHANGELOG.md", "package.json", "package-lock.json"]'
  major:
    description: "Update major version branch (e.g., v/1)"
    required: false
    default: "false"
  minor:
    description: "Update minor version branch (e.g., v/1.2)"
    required: false
    default: "false"
  prefix:
    description: "Branch path prefix for major/minor branches"
    required: false
    default: "v"
runs:
  using: "composite"
  steps:
    - name: Install Dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci

    - name: Extract Package Metadata
      shell: bash
      run: |
        PKG_NAME=$(jq -r '.name | split("/") | .[1]' ./package.json)
        echo "PKG_NAME=$PKG_NAME" >> $GITHUB_ENV

    - name: Run Semantic Release
      shell: bash
      env:
        RELEASE_PLUGIN_DIR: ${{ github.action_path }}
        RELEASE_ASSETS: ${{ inputs.assets }}
        RELEASE_MAJOR: ${{ inputs.major }}
        RELEASE_MINOR: ${{ inputs.minor }}
        RELEASE_PREFIX: ${{ inputs.prefix }}
      run: ${{ github.action_path }}/node_modules/.bin/semantic-release --extends ${{ github.action_path }}/release.config.js
