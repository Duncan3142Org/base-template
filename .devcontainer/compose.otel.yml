networks:
  otel:
    name: otel
    driver: bridge

volumes:
  otel_lgtm_data:
    name: otel-lgtm-data

services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.19.1
    restart: unless-stopped
    ports:
      - "3000:3000" # Grafana UI
    volumes:
      - otel_lgtm_data:/data
    networks:
      - otel
