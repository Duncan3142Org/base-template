networks:
  monitoring:
    driver: bridge

x-config:
  terraform_plugin_cache_path: &terraform_plugin_cache_path /root/.terraform.d/plugin-cache

volumes:
  node_modules:
  terraform_env_workspace:
  mise_data:
    name: shared-mise-data
  npm_cache:
    name: shared-npm-cache
  terraform_plugin_cache:
    name: shared-terraform-plugin-cache
  otel_lgtm_data:
    name: shared-otel-lgtm-data

services:
  devcon:
    build:
      context: ./devcontainer/
      dockerfile: Dockerfile
    image: devcon:latest

    # Keep container running indefinitely
    command: sleep infinity

    environment:
      TF_PLUGIN_CACHE_DIR: *terraform_plugin_cache_path

    # Mount project folder and Docker socket
    volumes:
      - ..:/workspace
      - ./devcontainer/.config/mise:/root/.config/mise
      - ${XDG_RUNTIME_DIR}/docker.sock:/var/run/docker.sock
      - ${HOME}/.terraform.d/credentials.tfrc.json:/root/.terraform.d/credentials.tfrc.json

      - node_modules:/workspace/node_modules
      - terraform_env_workspace:/workspace/.github/environments/.terraform

      - mise_data:/root/.local/share/mise
      - npm_cache:/root/.npm
      - type: volume
        source: terraform_plugin_cache
        target: *terraform_plugin_cache_path

    env_file:
      - ./devcontainer/.env
    secrets:
      - source: github_pkg_token
        target: github_pkg_token
      - source: gh_token
        target: gh_token
    networks:
      - monitoring

  # ------------------- #
  #      OTel-LGTM      #
  # ------------------- #
  otel-lgtm:
    image: grafana/otel-lgtm:0.19.1
    restart: unless-stopped
    ports:
      - "3000" # Grafana UI
    volumes:
      - otel_lgtm_data:/data
    networks:
      - monitoring

secrets:
  github_pkg_token:
    file: ./devcontainer/secrets/github_pkg_token
  gh_token:
    file: ./devcontainer/secrets/gh_token
